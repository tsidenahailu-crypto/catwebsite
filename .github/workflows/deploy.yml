name: Deploy Cat Website to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name catregistry

      - name: Build Docker image
        run: docker build -t catregistry101.azurecr.io/catwebsite .

      - name: Push image to Azure Registry
        run: docker push catregistry101.azurecr.io/catwebsite

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: catwebsite-app
          images: catregistry101.azurecr.io/catwebsite